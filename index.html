<style>
  body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
  .container { max-width: 700px; margin: 0 auto; }
  h1 { font-size: 1.4em; color: #333; border-bottom: 3px solid #4CAF50; padding-bottom: 10px; }
  .summary { display: flex; gap: 15px; margin: 24px 0; flex-wrap: wrap; }
  .card { background: white; border-radius: 10px; padding: 20px 25px; flex: 1; min-width: 120px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .card .num { font-size: 2.4em; font-weight: bold; }
  .card .label { font-size: 0.88em; color: #666; margin-top: 5px; }

  .month-card {

  .month-card.april { border-top-color: #FF9800; }
  .month-card.may   { border-top-color: #4CAF50; }
  .month-card .mc-title { font-size: 1.2em; font-weight: bold; margin-bottom: 12px; }
  .month-card.april .mc-title { color: #E65100; }
  .month-card.may   .mc-title { color: #2E7D32; }
  .month-card .mc-count { font-size: 2.6em; font-weight: bold; color: #333; }
  .month-card .mc-sub { font-size: 0.85em; color: #888; margin-top: 6px; }
  .month-card .mc-detail { margin-top: 14px; font-size: 0.9em; color: #555; line-height: 1.8; }
  .month-card .mc-arrow { text-align: right; font-size: 1.3em; margin-top: 12px; color: #aaa; }

  .meta { color: #999; font-size: 0.8em; margin-top: 24px; text-align: right; }
